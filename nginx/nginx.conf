server {
    listen 80;

    # Disable gzip since files are already minified
    gzip off;

    # Allow large file uploads (200MB)
    client_max_body_size 200m;

    # Use Docker's internal DNS resolver with a short TTL so upstream
    # hostnames are re-resolved on every request after a redeploy.
    # Without this, nginx caches IPs at startup and breaks when containers restart.
    resolver 127.0.0.11 valid=30s ipv6=off;
    resolver_timeout 5s;

    location /_next/static/ {
        set $upstream_frontend frontend:3000;
        proxy_pass http://$upstream_frontend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /public/ {
        set $upstream_frontend frontend:3000;
        proxy_pass http://$upstream_frontend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        expires 7d;
    }

    location /storage/ {
        set $upstream_minio minio:9000;
        proxy_pass http://$upstream_minio/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Enable CORS for video playback
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Amz-*" always;

        # Handle CORS preflight requests
        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    location /api/ {
        set $upstream_backend backend:5000;
        proxy_pass http://$upstream_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /socket.io/ {
        set $upstream_backend backend:5000;
        proxy_pass http://$upstream_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location / {
        set $upstream_frontend frontend:3000;
        proxy_pass http://$upstream_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
